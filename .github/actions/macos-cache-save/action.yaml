name: 'Milvus Cache'
description: ''
inputs:
  os:
    description: 'OS name'
    required: true
    default: 'ubuntu20.04'
  kind:
    description: 'Cache kind'
    required: false
    default: 'all'
runs:
  using: "composite"
  steps:
  - name: Generate CCache Hash
    run: |
      if [ -d "internal/core" ]; then
        # Use find to get all matching files and calculate hash (macOS compatible)
        CORE_HASH=$(find internal/core -type f \( -name "*.cpp" -o -name "*.cc" -o -name "*.c" -o -name "*.h" -o -name "*.hpp" -o -name "CMakeLists.txt" \) 2>/dev/null | sort | shasum -a 256 | cut -d' ' -f1 || echo "")
      else
        CORE_HASH=""
      fi
      echo "corehash=${CORE_HASH}" >> $GITHUB_ENV
      echo "Set CCache hash to ${CORE_HASH}"
    shell: bash
  - name: Mac Cache CCache Volumes
    uses: actions/cache/save@v4
    with:
      path: /var/tmp/ccache
      key: macos15-ccache-${{ env.corehash }}
  - name: Mac Cache Go Mod Volumes
    uses: actions/cache/save@v4
    with:
      path: ~/go/pkg/mod
      key: macos15-go-mod-${{ hashFiles('**/go.sum') }}
  - name: Mac Cache Conan Packages
    uses: actions/cache/save@v4
    with:
      path: ~/.conan
      key: macos15-conan-${{ hashFiles('internal/core/conanfile.*') }}

